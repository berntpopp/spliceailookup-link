name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Lint
        run: uv run ruff check spliceailookup_link tests

      - name: Format check
        run: uv run ruff format --check spliceailookup_link tests

      - name: Line budget
        run: uv run python scripts/check_file_size.py

      - name: Type check
        run: uv run mypy spliceailookup_link

      - name: Unit tests + coverage
        run: uv run pytest tests/unit --cov=spliceailookup_link --cov-report=term-missing
