name: Container Security

# GeneFoundry Container & Deployment Hardening Standard v1, rule 27-29:
# scan every image in CI, fail on fixable HIGH/CRITICAL, and retain an SBOM.

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "43 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  container-security:
    name: Container scan and SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t spliceailookup-link:scan .

      - name: Trivy scan (report, non-blocking)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: spliceailookup-link:scan
          format: table
          output: trivy-report.txt
          exit-code: "0"

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: spliceailookup-link:scan
          format: cyclonedx
          output: spliceailookup-link-sbom.cdx.json
          exit-code: "0"

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: container-security-artifacts
          path: |
            trivy-report.txt
            spliceailookup-link-sbom.cdx.json

      - name: Trivy scan (fail on fixable HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: spliceailookup-link:scan
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
