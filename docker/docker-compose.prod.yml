# Production hardening overlay for spliceailookup-link (GeneFoundry Container &
# Deployment Hardening Standard v1).
#
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d
#
# Layered on the base compose: drops the published host port (expose-only behind
# the reverse proxy), makes the root filesystem read-only with an explicit
# writable scratch tmpfs, drops all kernel capabilities, blocks privilege
# escalation, and bounds memory/CPU/PIDs. This is a light, stateless proxy to the
# Broad SpliceAI Lookup / Pangolin / Ensembl services — no local models, no DB.
services:
  spliceailookup-link:
    environment:
      SPLICEAILOOKUP_LINK_LOG_LEVEL: INFO
      SPLICEAILOOKUP_LINK_LOG_FORMAT: json
    # Expose-only behind the reverse proxy. !reset (not []) is required: Compose
    # MERGES list fields across -f overlays, so a plain `ports: []` would NOT drop
    # the base file's published "${SPLICEAILOOKUP_LINK_HOST_PORT:-8603}:8603" map.
    ports: !reset []
    expose:
      - "8603"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    init: true
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
          pids: 256
        reservations:
          memory: 256M
          cpus: "0.5"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=spliceailookup-link,environment=production"
