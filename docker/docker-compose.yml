# Explicit project name so this stack is isolated from the sibling -link
# projects (which also live under a docker/ directory and would otherwise share
# the default "docker" Compose project — making `--remove-orphans` dangerous).
name: spliceailookup-link

services:
  spliceailookup-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: spliceailookup-link:latest
    # Host port 8030 chosen to avoid colliding with sibling -link servers
    # (gnomad-link 8020, gtex-link 8765, etc.).
    ports:
      - "${SPLICEAILOOKUP_LINK_HOST_PORT:-8030}:8030"
    environment:
      SPLICEAILOOKUP_LINK_MCP_TRANSPORT: unified
      SPLICEAILOOKUP_LINK_MCP_HOST: 0.0.0.0
      SPLICEAILOOKUP_LINK_MCP_PORT: "8030"
      SPLICEAILOOKUP_LINK_MCP_PATH: /mcp
      SPLICEAILOOKUP_LINK_LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
